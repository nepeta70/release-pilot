services:
  api:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    build:
      context: ..           
      dockerfile: src/ReleasePilot.Api/Dockerfile
    ports:
      - "5000:8080"
    user: root
    entrypoint: ["sh", "-c", "apt-get update && apt-get install -y libgssapi-krb5-2 && dotnet ReleasePilot.Api.dll"]
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=release_db;Username=postgres;Password=postgres
      - NPGSQL_DISABLE_GSSAPI=true 
      - Kafka__BootstrapServers=kafka:9092
      - KAFKA_SASL_MECHANISM=PLAIN 
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      postgres:
        condition: service_healthy
      # kafka:
      #   condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=release_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - release_db_volume:/var/lib/postgresql/18/data
      - ../src/ReleasePilot.Infrastructure/Migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d release_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
      image: apache/kafka:latest
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        - KAFKA_NODE_ID=1
        - KAFKA_PROCESS_ROLES=broker,controller
        # Listen on all interfaces
        - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        # Advertised to the API container
        - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
        - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        # FIX: Use localhost or kafka here, NOT 0.0.0.0
        - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
        - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
        - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      volumes:
        - kafka_data:/var/lib/kafka/data
      healthcheck:
        # This ensures the API waits until Kafka is actually accepting traffic
        test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
    release_db_volume:
    kafka_data: