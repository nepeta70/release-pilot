services:
  api:
    build:
      context: ..           # Look for files at the root
      dockerfile: src/ReleasePilot.Api/Dockerfile # Use the file in the docker folder
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=release_db;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=release_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d release_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
      image: apache/kafka:latest
      container_name: releasepilot-kafka
      ports:
        - "9092:9092"
      environment:
        # Use a static Cluster ID for consistency (Required for KRaft)
        - KAFKA_CLUSTER_ID=6L8H_Y2SR_OqM2P_5F5Gzg
        - KAFKA_NODE_ID=1
        - KAFKA_PROCESS_ROLES=broker,controller
        - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
        - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
        - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
        - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
        - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      volumes:
        - kafka_data:/var/lib/kafka/data

volumes:
    kafka_data: